name: Signal Analytics — weekly transition statistics

on:
  # Every Sunday at 04:00 UTC — after a week of transitions have accumulated
  schedule:
    - cron: "0 4 * * 0"
  workflow_dispatch:

jobs:
  signal-analytics:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout marketscan
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install psycopg2-binary numpy

      - name: Run signal analytics
        run: python -m backend_worker.signal_analytics
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Summary
        run: echo "Signal analytics complete — signal_persistence_cache updated"
