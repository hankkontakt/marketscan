name: Doc Intelligence

# Daglig hämtning + extraktion av kvalitativa signaler ur rapporter.
# Körs 2×/dygn under rapportsäsong, annars 1×/dygn.

on:
  schedule:
    - cron: "0 5 * * 1-5"   # Vardagar 05:00 UTC
  workflow_dispatch:
    inputs:
      days:
        description: "Antal dagar bakåt"
        required: false
        default: "3"
        type: string
      tickers:
        description: "Tickers (kommaseparerade, valfritt)"
        required: false
        default: ""
        type: string

env:
  TZ: "Europe/Stockholm"
  PYTHONPATH: "."
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

jobs:
  doc-intelligence:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r backend_worker/requirements.txt
          pip install pdfplumber pypdf beautifulsoup4 lxml

      # ── Steg 1: Hämta dokument ──────────────────────────────────────────
      - name: Fetch documents
        run: |
          DAYS="${{ github.event.inputs.days || '3' }}"
          python -m backend_worker.rag.document_fetcher --days "$DAYS"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      # ── Steg 2: Extrahera signaler ──────────────────────────────────────
      - name: Extract signals
        run: |
          python -m backend_worker.rag.extract_signals
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
