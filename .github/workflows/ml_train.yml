name: ML Training

on:
  schedule:
    - cron: "0 6 * * 0"  # Every Sunday at 06:00 UTC
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend_worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install pandas numpy xgboost scikit-learn yfinance python-dotenv
      - name: Train ML models
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python ml_trainer.py | tee ml_output.json
