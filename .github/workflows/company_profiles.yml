name: Company Profiles — refresh yfinance data

# Fetches company descriptions, employees, website, 52-week range, beta
# for all tickers in scan_results and upserts into company_profiles table.
#
# Step 1 automatically creates the table if it doesn't exist — no manual
# SQL migration needed. Just click "Starta" from the admin panel.
#
# Runs weekly on Sundays or manually from the admin panel.

on:
  schedule:
    - cron: "0 7 * * 0"   # Söndagar 07:00 UTC (after ML training at 06:00)
  workflow_dispatch:
    inputs:
      ticker:
        description: "Single ticker to refresh (blank = all)"
        type: string
        default: ""

env:
  TZ: "Europe/Stockholm"

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install psycopg2-binary yfinance

      # ── Steg 1: Skapa tabell om den inte finns ───────────────────────────
      # Körs varje gång (idempotent via IF NOT EXISTS).
      # Ingen manuell SQL-migration behövs — detta är migrationen.

      - name: Run migration — create company_profiles table
        run: |
          python - <<'EOF'
          import os, psycopg2

          dsn = os.environ["DATABASE_URL"]
          conn = psycopg2.connect(dsn)
          cur = conn.cursor()

          cur.execute("""
            CREATE TABLE IF NOT EXISTS company_profiles (
              ticker          TEXT        PRIMARY KEY,
              description     TEXT,
              employees       INTEGER,
              website         TEXT,
              industry        TEXT,
              country         TEXT,
              beta            NUMERIC(6,4),
              week_52_high    NUMERIC(12,4),
              week_52_low     NUMERIC(12,4),
              updated_at      TIMESTAMPTZ DEFAULT NOW()
            )
          """)
          cur.execute("""
            CREATE INDEX IF NOT EXISTS idx_company_profiles_updated
              ON company_profiles (updated_at DESC)
          """)
          conn.commit()

          cur.execute("SELECT COUNT(*) FROM company_profiles")
          count = cur.fetchone()[0]
          conn.close()

          print(f"Migration OK — company_profiles table ready ({count} existing rows)")
          EOF
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      # ── Steg 2: Hämta bolagsprofiler ─────────────────────────────────────

      - name: Refresh company profiles
        run: |
          TICKER_ARG=""
          if [ -n "${{ github.event.inputs.ticker }}" ]; then
            TICKER_ARG="--ticker ${{ github.event.inputs.ticker }}"
          fi
          python -m backend_worker.company_info_fetcher $TICKER_ARG
        env:
          DATABASE_URL:    ${{ secrets.DATABASE_URL }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          FMP_API_KEY:     ${{ secrets.FMP_API_KEY }}
          PYTHONPATH: "."
