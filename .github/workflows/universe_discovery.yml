name: Universe Discovery

on:
  schedule:
    - cron: "0 9 * * 0"  # Every Sunday at 09:00 UTC
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend_worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install pandas numpy python-dotenv
      - name: Discover candidates
        run: python universe_discovery.py | tee discovery_output.json
